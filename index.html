<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Food Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="picker-box">
        <div class="header-container">
            <span class="sparkle-icon">✨</span>
            <h1>YumPick</h1>
            <span class="sparkle-icon">✨</span>
            <p class="cute-subtitle">What should we eat today? 😋</p>
        </div>

        <div class="input-row">
            <input type="text" id="foodInput" placeholder="Cupcakes, ramen, tacos...">
            <button id="addBtn">Add</button>
        </div>

        <ul id="foodList"></ul>

        <button id="pickBtn">Pick for Me! 🎲</button>

        <h2 id="resultDisplay"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
